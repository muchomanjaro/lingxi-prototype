<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>捷思AI — 你的专属AI助手</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--green:#07C160;--green-dark:#06AD56;--green-light:#E8F8E8;--green-pale:#F0FFF0;--bg:#f5f5f5;--card:#fff;--text:#191919;--text2:#888;--text3:#bbb;--border:#e9e9e9;--radius:12px;--shadow:0 1px 4px rgba(0,0,0,.06);--font:-apple-system,BlinkMacSystemFont,"SF Pro Display","PingFang SC","Helvetica Neue",sans-serif}
body{font-family:var(--font);background:#e5e5e5;display:flex;justify-content:center;min-height:100vh;color:var(--text);-webkit-font-smoothing:antialiased}
.app{width:100%;max-width:414px;min-height:100vh;background:var(--bg);position:relative;display:flex;flex-direction:column;box-shadow:0 0 30px rgba(0,0,0,.1)}
/* Header */
.header{background:var(--green);padding:44px 16px 12px;color:#fff;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.header-l{display:flex;align-items:center;gap:10px}
.header-logo{width:28px;height:28px;background:#fff;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:var(--green)}
.header-title{font-size:17px;font-weight:600}
.header-status{font-size:11px;padding:2px 8px;border-radius:10px;background:rgba(255,255,255,.2)}
.header-sub{font-size:10px;opacity:.7;margin-top:-1px}
/* Tab Content */
.content{flex:1;overflow-y:hidden;padding:0;-webkit-overflow-scrolling:touch;position:relative}
.tab-pane{display:none;padding:12px 12px 0;animation:fadeIn .25s;height:100%;overflow-y:auto}
.tab-pane.active{display:block;padding-bottom:60px}
.tab-pane#tabChat.active{padding-bottom:50px;display:flex;flex-direction:column}
.tab-pane#tabChat.active .chat-wrap{flex:1;overflow-y:auto;padding:12px 12px 0}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
/* Tab Bar */
.tabbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:414px;background:#fff;border-top:1px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom,0);flex-shrink:0}
.tab-item{flex:1;text-align:center;padding:6px 0 4px;cursor:pointer;transition:.15s;position:relative}
.tab-item svg{display:block;margin:0 auto 2px;width:24px;height:24px;fill:var(--text3)}
.tab-item span{font-size:10px;color:var(--text3);display:block;line-height:1.2}
.tab-item.active svg{fill:var(--green)}
.tab-item.active span{color:var(--green)}
.tab-badge{position:absolute;top:2px;right:50%;transform:translateX(18px);background:#FF3B30;color:#fff;font-size:9px;padding:1px 5px;border-radius:8px;font-weight:600}
/* Cards */
.card{background:var(--card);border-radius:var(--radius);padding:16px;margin-bottom:10px;box-shadow:var(--shadow)}
.card-title{font-size:15px;font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.card-sub{font-size:11px;color:var(--text2);margin-bottom:12px;line-height:1.5}
/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;padding:10px 24px;border-radius:8px;font-size:15px;font-weight:500;border:none;cursor:pointer;transition:.15s;gap:4px;font-family:var(--font)}
.btn-primary{background:var(--green);color:#fff}
.btn-primary:hover{background:var(--green-dark)}
.btn-outline{background:transparent;color:var(--green);border:1.5px solid var(--green)}
.btn-outline:hover{background:var(--green-pale)}
.btn-block{width:100%}
.btn-lg{padding:14px 32px;font-size:17px;font-weight:600;border-radius:10px}
.btn-sm{padding:6px 14px;font-size:12px}
.btn-danger{color:#FF3B30;border-color:#FF3B30}
.btn-disabled{opacity:.5;pointer-events:none}
/* Option Grid */
.opt-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px}
.opt-btn{padding:10px 18px;border-radius:8px;border:1.5px solid var(--border);background:#fff;font-size:14px;cursor:pointer;transition:.15s;font-family:var(--font);color:var(--text);flex:1;min-width:calc(50% - 4px);text-align:center}
.opt-btn:hover{border-color:var(--green);background:var(--green-pale)}
.opt-btn.selected{border-color:var(--green);background:var(--green-light);color:var(--green-dark);font-weight:600}
.opt-btn .en{display:block;font-size:10px;color:var(--text3);font-weight:400;margin-top:2px}
.opt-btn.selected .en{color:var(--green);opacity:.7}
.opt-btn.multi{min-width:calc(33.33% - 6px)}
.opt-btn.multi.selected{background:var(--green-light)}
.opt-btn.disabled{opacity:.4;pointer-events:none}
/* Input */
.input-group{margin-bottom:10px}
.input-label{font-size:13px;font-weight:500;margin-bottom:4px;display:flex;align-items:baseline;gap:6px}
.input-label .en{font-size:10px;color:var(--text3);font-weight:400}
.input-field{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:15px;outline:none;transition:.15s;font-family:var(--font);background:#fff}
.input-field:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(7,193,96,.12)}
.input-field::placeholder{color:var(--text3)}
/* Radio */
.radio-group{display:flex;gap:8px;margin-bottom:10px}
.radio-btn{flex:1;padding:12px;border:1.5px solid var(--border);border-radius:8px;text-align:center;cursor:pointer;transition:.15s;font-size:14px;font-family:var(--font);background:#fff}
.radio-btn:hover{border-color:var(--green)}
.radio-btn.active{border-color:var(--green);background:var(--green-light);color:var(--green-dark);font-weight:600}
.radio-btn .en{display:block;font-size:10px;color:var(--text3);font-weight:400;margin-top:2px}
.radio-btn.active .en{color:var(--green);opacity:.7}
/* Textarea */
.textarea-field{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;outline:none;resize:vertical;min-height:80px;transition:.15s;font-family:var(--font);background:#fff}
.textarea-field:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(7,193,96,.12)}
/* Step Navigation */
.step-nav{display:flex;gap:10px;margin-top:16px}
.step-nav .btn{flex:1}
/* Step Progress */
.step-dots{display:flex;justify-content:center;gap:8px;margin-bottom:16px}
.step-dot{width:8px;height:8px;border-radius:50%;background:var(--border);transition:.3s}
.step-dot.active{background:var(--green);width:24px;border-radius:4px}
.step-dot.done{background:var(--green)}
/* Plan Card */
.plan-card{border:2px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:10px;cursor:pointer;transition:.15s}
.plan-card:hover{border-color:var(--green)}
.plan-card.recommended{border-color:var(--green);background:var(--green-pale)}
.plan-card .plan-name{font-size:16px;font-weight:600}
.plan-card .plan-price{font-size:22px;font-weight:700;color:var(--green);margin:4px 0}
.plan-card .plan-price span{font-size:13px;font-weight:400;color:var(--text2)}
.plan-card .plan-desc{font-size:12px;color:var(--text2);line-height:1.5}
.plan-card .plan-tag{display:inline-block;font-size:10px;padding:2px 8px;border-radius:4px;background:var(--green);color:#fff;margin-top:6px}
.plan-card.selected{border-color:var(--green);background:var(--green-light)}
/* Payment Sheet */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:flex-end;justify-content:center}
.modal-overlay.show{display:flex}
.modal-sheet{background:#f2f2f2;width:100%;max-width:414px;border-radius:16px 16px 0 0;padding:20px;animation:slideUp .3s;max-height:90vh;overflow-y:auto}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:36px;height:4px;background:#ddd;border-radius:2px;margin:0 auto 16px}
.pay-merchant{text-align:center;margin-bottom:16px}
.pay-merchant .name{font-size:15px;font-weight:600}
.pay-merchant .sub{font-size:11px;color:var(--text2);margin-top:2px}
.pay-amount{text-align:center;font-size:36px;font-weight:700;color:var(--text);margin-bottom:20px}
.pay-amount span{font-size:16px;font-weight:400}
.pay-detail{background:#fff;border-radius:8px;padding:12px 16px;margin-bottom:16px}
.pay-detail-row{display:flex;justify-content:space-between;padding:8px 0;font-size:14px;border-bottom:1px solid #f0f0f0}
.pay-detail-row:last-child{border-bottom:none}
.pay-detail-row .label{color:var(--text2)}
.pay-detail-row .value{font-weight:500}
.pay-detail-row.total{font-weight:700;font-size:16px;border-top:2px dashed #ddd;margin-top:4px;padding-top:12px}
.pay-detail-row.total .value{color:var(--green)}
.pay-btn{background:var(--green);color:#fff;width:100%;padding:16px;border:none;border-radius:10px;font-size:18px;font-weight:600;cursor:pointer;font-family:var(--font);transition:.15s}
.pay-btn:hover{background:var(--green-dark)}
.pay-btn:disabled{opacity:.5}
.pay-footer{text-align:center;font-size:11px;color:var(--text3);margin-top:12px}
/* Success Animation */
.success-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;display:none;align-items:center;justify-content:center;flex-direction:column;color:#fff}
.success-overlay.show{display:flex}
.success-icon{width:64px;height:64px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;font-size:32px;margin-bottom:16px;animation:bounceIn .5s}
@keyframes bounceIn{0%{transform:scale(0)}50%{transform:scale(1.2)}100%{transform:scale(1)}}
.success-text{font-size:20px;font-weight:600;margin-bottom:4px}
.success-sub{font-size:14px;opacity:.8;margin-bottom:24px}
/* Post-purchase Progress */
.progress-steps{padding:8px 0}
.progress-step{display:flex;align-items:center;gap:12px;padding:12px 0;opacity:.4;transition:.5s}
.progress-step.active{opacity:1}
.progress-step.done{opacity:1}
.progress-step .check{width:24px;height:24px;border-radius:50%;border:2px solid var(--text3);display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;transition:.3s}
.progress-step.done .check{border-color:var(--green);background:var(--green);color:#fff}
.progress-step.active .check{border-color:var(--green);color:var(--green)}
.progress-step .step-text{font-size:14px}
.progress-step .step-text .en{font-size:10px;color:var(--text2);display:block}
/* Chat */
.chat-container{display:flex;flex-direction:column;gap:10px;padding:4px 0}
.chat-msg{display:flex;gap:8px;max-width:88%;animation:msgIn .3s}
.chat-msg.ai{align-self:flex-start}
.chat-msg.user{align-self:flex-end;flex-direction:row-reverse}
@keyframes msgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.chat-avatar{width:32px;height:32px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600}
.chat-msg.ai .chat-avatar{background:var(--green);color:#fff}
.chat-msg.user .chat-avatar{background:#ddd;color:var(--text2)}
.chat-bubble{padding:10px 14px;border-radius:12px;font-size:14px;line-height:1.6;position:relative}
.chat-msg.ai .chat-bubble{background:#fff;border-top-left-radius:2px;box-shadow:var(--shadow)}
.chat-msg.user .chat-bubble{background:var(--green);color:#fff;border-top-right-radius:2px}
.chat-bubble .en{font-size:11px;opacity:.7;display:block;margin-top:4px}
.chat-msg.user .chat-bubble .en{opacity:.6}
.chat-time{font-size:10px;color:var(--text3);text-align:center;margin:6px 0}
.chat-input{display:flex;gap:8px;padding:10px 12px;background:#fff;border-top:1px solid var(--border);flex-shrink:0}
.chat-input input{flex:1;padding:10px 14px;border:1.5px solid var(--border);border-radius:20px;font-size:14px;outline:none;font-family:var(--font);transition:.15s}
.chat-input input:focus{border-color:var(--green)}
.chat-input .send-btn{width:38px;height:38px;border-radius:50%;background:var(--green);color:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.15s}
.chat-input .send-btn:hover{background:var(--green-dark)}
.chat-input .send-btn:disabled{opacity:.4}
.chat-input .attach-btn{width:38px;height:38px;border-radius:50%;background:transparent;color:var(--text3);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.15s}
.chat-input .attach-btn:hover{color:var(--green);background:var(--green-pale)}
.chat-input .attach-btn:active{transform:scale(.92)}
.chat-bubble.file-msg{display:flex;align-items:center;gap:8px;padding:8px 12px}
.chat-bubble.file-msg .file-icon{font-size:20px}
.chat-bubble.file-msg .file-info{flex:1;min-width:0}
.chat-bubble.file-msg .file-name{font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chat-bubble.file-msg .file-size{font-size:10px;opacity:.7}
.chat-msg.user .chat-bubble.file-msg .file-name{color:#fff}
.chat-typing{display:flex;gap:4px;padding:8px 0}
.chat-typing span{width:6px;height:6px;border-radius:50%;background:var(--text3);animation:typing 1.2s infinite}
.chat-typing span:nth-child(2){animation-delay:.2s}
.chat-typing span:nth-child(3){animation-delay:.4s}
@keyframes typing{0%,60%,100%{opacity:.3}30%{opacity:1}}
/* Settings */
.settings-header{text-align:center;padding:20px 0 10px}
.settings-avatar{width:56px;height:56px;border-radius:50%;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;font-size:24px;margin:0 auto 8px}
.settings-name{font-size:18px;font-weight:600}
.settings-plan{font-size:12px;color:var(--text2)}
.settings-section{margin-bottom:16px}
.settings-section-title{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:8px;padding-left:2px}
.settings-row{display:flex;justify-content:space-between;padding:12px 14px;background:#fff;border-radius:8px;margin-bottom:2px;font-size:14px;box-shadow:var(--shadow)}
.settings-row .label{color:var(--text2);display:flex;align-items:center;gap:6px}
.settings-row .label .en{font-size:10px;color:var(--text3)}
.settings-row .value{font-weight:500;text-align:right}
.settings-row .value.unset{color:var(--text3);font-style:italic}
.settings-row .value.green{color:var(--green)}
.settings-row .value.orange{color:#F5A623}
.settings-row .value.red{color:#FF3B30}
.settings-divider{height:1px;background:var(--border);margin:12px 0}
/* Welcome */
.welcome-icon{text-align:center;padding:20px 0 8px}
.welcome-icon span{font-size:48px}
.welcome-title{text-align:center;font-size:20px;font-weight:700;margin-bottom:4px}
.welcome-sub{text-align:center;font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:16px}
/* API Tips */
.api-tips{background:#FFF8E1;border-radius:8px;padding:12px;margin-top:8px;font-size:13px;line-height:1.6;color:#5D4E37}
.api-tips a{color:var(--green);text-decoration:none;font-weight:500}
.api-tips a:hover{text-decoration:underline}
/* Plan Compare */
.plan-compare{display:grid;grid-template-columns:1fr;gap:8px}
.plan-compare .plan-compact{border:1.5px solid var(--border);border-radius:10px;padding:14px;cursor:pointer;transition:.15s;position:relative}
.plan-compact:hover{border-color:var(--green)}
.plan-compact.recommended{border-color:var(--green);background:var(--green-pale)}
.plan-compact.selected{background:var(--green-light);border-color:var(--green)}
.plan-compact .tag{position:absolute;top:-8px;right:12px;background:var(--green);color:#fff;font-size:10px;padding:2px 8px;border-radius:4px}
.plan-compact .name{font-size:15px;font-weight:600}
.plan-compact .price{font-size:20px;font-weight:700;color:var(--green)}
.plan-compact .price span{font-size:12px;font-weight:400;color:var(--text2)}
.plan-compact .feats{font-size:12px;color:var(--text2);margin-top:6px;line-height:1.5}
/* Completed Banner */
.completed-banner{background:var(--green-light);border-radius:var(--radius);padding:16px;text-align:center;margin-bottom:12px;border:1.5px solid var(--green)}
.completed-banner .icon{font-size:32px;margin-bottom:4px}
.completed-banner .text{font-size:14px;font-weight:600;color:var(--green-dark)}
.completed-banner .sub{font-size:12px;color:var(--text2);margin-top:4px}
/* Scrollbar */
.content::-webkit-scrollbar{width:3px}
.content::-webkit-scrollbar-thumb{background:#ddd;border-radius:2px}
/* Multi-select count */
.multi-count{font-size:11px;color:var(--text2);text-align:right;margin-bottom:6px}
/* Transition helpers */
.slide-enter{animation:slideFade .3s}
@keyframes slideFade{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
</style>
</head>
<body>
<div class="app" id="app">
  <!-- Header -->
  <div class="header">
    <div class="header-l">
      <div class="header-logo">灵</div>
      <div>
        <div class="header-title">捷思AI</div>
        <div class="header-sub">Jiesi · Your AI Concierge</div>
      </div>
    </div>
    <div class="header-status" id="headerStatus">未配置</div>
  </div>

  <!-- Tab Content -->
  <div class="content" id="content">
    <!-- Tab 1: Onboarding -->
    <div class="tab-pane active" id="tabOnboarding">
      <div id="onboardingContent"></div>
    </div>

    <!-- Tab 2: Chat -->
    <div class="tab-pane" id="tabChat">
      <div class="chat-wrap">
        <div id="chatContent">
          <div class="chat-container" id="chatMessages"></div>
        </div>
      </div>
      <div class="chat-input">
        <button class="attach-btn" id="attachBtn" onclick="document.getElementById('fileInput').click()" title="上传文件">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
        </button>
        <input type="file" id="fileInput" style="display:none" onchange="handleFileSelect(event)">
        <input type="text" id="chatInput" placeholder="输入消息..." maxlength="200">
        <button class="send-btn" id="sendBtn" onclick="sendChat()">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>
    </div>

    <!-- Tab 3: Settings -->
    <div class="tab-pane" id="tabSettings">
      <div id="settingsContent"></div>
    </div>
  </div>

  <!-- Tab Bar -->
  <div class="tabbar">
    <div class="tab-item active" data-tab="onboarding" onclick="switchTab('onboarding')">
      <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
      <span>引导<br><small>Onboard</small></span>
    </div>
    <div class="tab-item" data-tab="chat" onclick="switchTab('chat')">
      <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
      <span>对话<br><small>Chat</small></span>
    </div>
    <div class="tab-item" data-tab="settings" onclick="switchTab('settings')">
      <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 00.12-.61l-1.92-3.32a.488.488 0 00-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 00-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 00-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6A3.6 3.6 0 1115.6 12 3.611 3.611 0 0112 15.6z"/></svg>
      <span>设置<br><small>Settings</small></span>
    </div>
  </div>

  <!-- Payment Modal -->
  <div class="modal-overlay" id="paymentModal">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="pay-merchant">
        <div class="name">捷思AI</div>
        <div class="sub">Jiesi AI · 微信支付</div>
      </div>
      <div class="pay-amount"><span>¥</span><span id="payAmount">1,999</span></div>
      <div class="pay-detail" id="payDetail"></div>
      <button class="pay-btn" id="payBtn" onclick="processPayment()">立即支付</button>
      <div class="pay-footer">WeChat Pay · 由微信支付提供</div>
    </div>
  </div>

  <!-- Success Overlay -->
  <div class="success-overlay" id="successOverlay">

  enterprise:{id:'enterprise',name:'企业版',en:'Enterprise',price:14999,desc:'适合2-5人团队。包含管理后台和专属Aura实例。',feats:['3个专业版席位','独立API密钥池','专属Aura实例','管理控制台','30分钟人工响应','6个月API用量','自定义技能包开发']}

let state = loadState();

function defaultState() {
  return {
    onboardingComplete:false,
    currentStep:0,
    profession:'',
    name:'',
    wechatId:'',
    computer:'',
    terminalComfort:'',
    apiProvider:'',
    apiProviderShowGuide:false,
    timeSinks:[],
    dailyTools:[],
    aiHelpText:'',
    recommendedPlan:'',
    planChosen:'',
    paymentDone:false,
    activated:false,
    chatMessages:[],
    currentTab:'onboarding',
    postPurchaseDone:false
  };
}

function loadState() {
  try {
    const d = JSON.parse(localStorage.getItem(STORAGE_KEY));
    if(d&&typeof d==='object'){return{...defaultState(),...d}}
  }catch(e){}
  return defaultState();
}

function saveState() {
  localStorage.setItem(STORAGE_KEY,JSON.stringify(state));
}

function init() {
  render();
  updateHeader();
  if(state.chatMessages.length===0){
    addChatMsg('ai','你好！我是奥拉，你的AI助手。有什么我可以帮你的吗？','Hi! I\'m Aura, your AI concierge. How can I help you?');
  }
  renderChat();
  switchTab(state.currentTab);
  document.getElementById('chatInput').addEventListener('keydown',function(e){
    if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendChat()}
  });
}

window.addEventListener('DOMContentLoaded',init);

function updateHeader() {
  const el=document.getElementById('headerStatus');
  if(!el)return;
  if(state.paymentDone&&state.activated)el.textContent='已激活 Active';
  else if(state.paymentDone)el.textContent='配置中 Configuring';
  else if(state.onboardingComplete)el.textContent='待支付 Pending';
  else el.textContent='未配置 Not set';
  el.style.background=state.activated?'rgba(255,255,255,.25)':state.paymentDone?'rgba(255,255,255,.18)':'rgba(255,255,255,.13)';
}

function switchTab(tab) {
  state.currentTab=tab;
  saveState();
  document.querySelectorAll('.tab-pane').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.tab-item').forEach(el=>el.classList.remove('active'));
  document.getElementById('tab'+tab.charAt(0).toUpperCase()+tab.slice(1)).classList.add('active');
  document.querySelector(`.tab-item[data-tab="${tab}"]`).classList.add('active');
  if(tab==='onboarding')renderOnboarding();
  if(tab==='settings')renderSettings();
  if(tab==='chat'){renderChat();setTimeout(()=>document.getElementById('chatInput').focus(),100)}
  const wrap=document.querySelector(tab==='chat'?'.chat-wrap':'.content');
  if(wrap)wrap.scrollTop=0;
}

function render() {
  renderOnboarding();
  renderSettings();
  renderChat();
}

/* ===== ONBOARDING ===== */

function renderOnboarding() {
  const el=document.getElementById('onboardingContent');

        <button class="btn btn-outline btn-block" onclick="resetOnboarding()">重新开始引导 Restart Onboarding</button>
      </div>`;
    return;
  }
  const steps=[renderStep0,renderStep1,renderStep2,renderStep2_5,renderStep3,renderStep4,renderStep5,renderStep6];
  const idx=Math.min(state.currentStep,steps.length-1);
  steps[idx](el);
}

}

  return {deepseek:'🧠',openai:'⚡',anthropic:'🌿',google:'🔮',local:'💻'}[id]||'🤖';

function selectProvider(id) {
  state.apiProvider=id;
  state.apiProviderShowGuide=false;
  saveState();
  renderOnboarding();
}

function toggleApiGuide() {
  state.apiProvider='none';
  state.apiProviderShowGuide=!state.apiProviderShowGuide;
  saveState();
  renderOnboarding();
}

function getProviderLabel(id) {
  const p=AI_PROVIDERS.find(x=>x.id===id);
  return p?p.label:id==='none'?'未选择':'AI';
}

function getProviderEn(id) {
  const p=AI_PROVIDERS.find(x=>x.id===id);
  return p?p.en:id==='none'?'Not selected':'AI';
}

function toggleTimeSink(id) {

  renderOnboarding();
}

function toggleDailyTool(id) {
  if(state.dailyTools.includes(id)){
    state.dailyTools=state.dailyTools.filter(x=>x!==id);
  }else{
    state.dailyTools.push(id);
  }
  saveState();
  renderOnboarding();
}

  const plans=[PLANS.starter,PLANS.pro,PLANS.enterprise];
  el.innerHTML=`

function selectPlan(id) {
  state.planChosen=id;
  saveState();
  renderOnboarding();
}

function recommendPlan() {
  const t=state.terminalComfort;
  const pCount=state.timeSinks.length;
  const toolCount=state.dailyTools.length;
  if(pCount>=3||toolCount>=5||state.profession==='consultant')return PLANS.enterprise;
  if(t==='expert'||(t==='copy'&&pCount>=2))return PLANS.pro;
  if(t==='never'||(t==='copy'&&pCount<=1))return PLANS.starter;
  return PLANS.starter;
}

function animateProgress() {
  setTimeout(()=>{
    const s2=document.getElementById('stepConfigAI');
    const s3=document.getElementById('stepLoadSkills');
    const s4=document.getElementById('stepReady');
    if(s2){s2.classList.remove('active');s2.classList.add('done');s2.querySelector('.check').textContent='✓'}
    if(s3){s3.classList.add('active')}
    setTimeout(()=>{
      if(s3){s3.classList.remove('active');s3.classList.add('done');s3.querySelector('.check').textContent='✓'}
      if(s4){s4.classList.add('active')}
      setTimeout(()=>{
        if(s4){s4.classList.remove('active');s4.classList.add('done');s4.querySelector('.check').textContent='✓'}
        state.activated=true;
        saveState();
        updateHeader();
      },1200);
    },1000);
  },600);
}

function updateDots(step) {
  const total=8;
  document.querySelectorAll('[id^=stepDots]').forEach(c=>{
    if(!c.querySelector('.step-dot')){
      for(let i=0;i<total;i++){const d=document.createElement('div');d.className='step-dot';c.appendChild(d)}
    }
    c.querySelectorAll('.step-dot').forEach((d,i)=>{d.className='step-dot'+(i<step?' done':i===step?' active':'')});
  });
}

function getProfLabel(id) {
  const p=PROFESSIONS.find(x=>x.id===id);
  return p?p.label+' '+p.en:id||'未选择';
}

function getPlan(id) {
  return PLANS[id||'starter']||PLANS.starter;
}

function goStep(step) {
  state.currentStep=step;
  saveState();
  renderOnboarding();
  document.getElementById('content').scrollTop=0;
}

/* ===== PAYMENT ===== */

function openPayment() {

  document.getElementById('payAmount').textContent=plan.price.toLocaleString();

    <div class="pay-detail-row"><span class="label">商品 Item</span><span class="value">${plan.name} ${plan.en}</span></div>

  `;

function processPayment() {
  document.getElementById('payBtn').disabled=true;
  document.getElementById('payBtn').textContent='处理中...';
  setTimeout(()=>{
    document.getElementById('paymentModal').classList.remove('show');
    document.getElementById('successOverlay').classList.add('show');
    state.paymentDone=true;
    saveState();
    updateHeader();
    addChatMsg('ai','🎉 支付成功！感谢你的信任！你的专属AI助手正在准备中，大约30-60分钟后就会准备好。我会通过微信联系你。','Payment successful! Your dedicated AI assistant is being prepared and will be ready in 30-60 minutes.');
    renderChat();
  },1500);
}

function closeSuccess() {
  document.getElementById('successOverlay').classList.remove('show');
  document.getElementById('payBtn').disabled=false;
  document.getElementById('payBtn').textContent='立即支付';
  state.currentStep=7;
  saveState();
  renderOnboarding();
  switchTab('onboarding');
}

/* ===== FINISH ===== */

function finishOnboarding() {
  state.onboardingComplete=true;
  state.postPurchaseDone=true;
  saveState();
  updateHeader();
  switchTab('chat');
}

function resetOnboarding() {
  if(confirm('确定要重新开始引导吗？所有数据将被清除。\nRestart onboarding? All data will be cleared.')){
    Object.assign(state,defaultState());
    state.chatMessages=[];
    saveState();
    addChatMsg('ai','你好！我是奥拉，你的AI助手。让我们重新开始吧！','Hi! I\'m Aura. Let\'s start fresh!');
    render();
    updateHeader();
    switchTab('onboarding');
  }
}

/* ===== CHAT ===== */

function addChatMsg(role,text,en,file) {
  state.chatMessages.push({role,text,en,file,time:new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'})});
  saveState();
}

function renderChat() {
  const el=document.getElementById('chatMessages');
  if(!el)return;
  if(state.chatMessages.length===0){
    el.innerHTML='<div style="text-align:center;padding:40px 20px;color:var(--text3);font-size:13px">开始对话吧<br><span style="font-size:11px">Start a conversation</span></div>';
    return;
  }
  el.innerHTML=state.chatMessages.map(m=>`
    <div class="chat-msg ${m.role}">
      <div class="chat-avatar">${m.role==='ai'?'奥':'你'}</div>
      ${m.file
        ? `<div class="chat-bubble file-msg">
            <span class="file-icon">${m.file.icon}</span>
            <div class="file-info">
              <div class="file-name">${m.file.name}</div>
              <div class="file-size">${m.file.size}</div>
            </div>
          </div>`
        : `<div class="chat-bubble">${m.text.replace(/\n/g,'<br>')}${m.en?`<span class="en">${m.en}</span>`:''}</div>`}
    </div>`).join('');
  const wrap=document.querySelector('.chat-wrap');
  if(wrap)wrap.scrollTop=wrap.scrollHeight;
}

function sendChat() {
  const input=document.getElementById('chatInput');
  const text=input.value.trim();
  if(!text)return;
  addChatMsg('user',text);
  input.value='';
  renderChat();
  setTimeout(()=>generateAuraResponse(text),400);
}

function handleFileSelect(e) {
  const file=e.target.files[0];
  if(!file)return;
  const icon=
    file.type.startsWith('image/')?'🖼️':
    file.type.includes('pdf')?'📄':
    file.name.endsWith('.zip')||file.name.endsWith('.rar')?'📦':
    file.type.includes('word')||file.name.endsWith('.doc')?'📝':
    file.type.includes('sheet')||file.name.endsWith('.xls')?'📊':
    '📎';
  const size=
    file.size<1024?file.size+'B':
    file.size<1048576?(file.size/1024).toFixed(1)+'KB':
    (file.size/1048576).toFixed(1)+'MB';
  addChatMsg('user',file.name,'上传文件 File attached',{name:file.name,size,icon});
  e.target.value='';
  renderChat();
  setTimeout(()=>generateAuraResponse('上传了文件: '+file.name+' ('+size+')'),400);
}

function generateAuraResponse(userText) {
  const p=getProfLabel(state.profession);
  const plan=state.planChosen?getPlan(state.planChosen).name+' '+getPlan(state.planChosen).en:'';
  const name=state.name||'朋友';
  const hasContext=state.profession||state.name||state.planChosen;
  
  const knowledge = [];
  if(state.name)knowledge.push('姓名: '+state.name);
  if(state.profession)knowledge.push('职业: '+p);
  if(state.planChosen)knowledge.push('方案: '+plan);
  if(state.paymentDone)knowledge.push('已支付');
  if(state.activated)knowledge.push('已激活');
  
  let response='',responseEn='';
  const t=userText.toLowerCase();
  
  if(t.includes('你好')||t.includes('hi')||t.includes('hello')){
    if(hasContext){
      response=name+'你好！我是奥拉。';
      responseEn='Hello '+name+'! I\'m Aura.';
      if(state.profession){
        response+='作为'+p.split(' ')[0]+'，有什么我可以帮你的吗？';
        responseEn+=' As a '+p.split(' ').slice(1).join(' ')+', how can I help?';
      }
    }else{
      response='你好！我是奥拉，你的AI助手。请前往"引导"标签完成设置，我就能为你提供个性化帮助。';
      responseEn='Hi! I\'m Aura. Please complete onboarding in the Onboard tab so I can help you better.';
    }
  }
  else if(t.includes('skill')||t.includes('技能')||t.includes('pack')||t.includes('包')){
    if(state.profession){
      const skills=PROFESSION_SKILLS[state.profession];
      response='作为'+p.split(' ')[0]+'，你的技能包包含：<br>• '+skills.join('<br>• ');
      responseEn='Your skill pack includes: '+skills.join(', ');
    }else{
      response='请先在引导中选择你的职业，我才能为你推荐合适的技能包。';
      responseEn='Please select your profession in onboarding first.';
    }
  }
  else if(t.includes('价格')||t.includes('price')||t.includes('钱')||t.includes('费用')||t.includes('多少钱')){
    const rec=recommendPlan();
    response='我们的方案：<br>• 入门版 ¥1,999 — 适合个人首次使用<br>• 专业版 ¥4,999 — 适合专业人士<br>• 企业版 ¥14,999 — 适合2-5人团队<br><br>根据你的情况，我推荐'+rec.name+'(¥'+rec.price.toLocaleString()+')。';
    responseEn='Our plans: Starter ¥1,999, Pro ¥4,999, Enterprise ¥14,999. Based on your needs, I recommend '+rec.en+'.';
  }
  else if(t.includes('api')||t.includes('key')||t.includes('密钥')){
    response='你需要一个DeepSeek API密钥来使用AI助手。可以访问 platform.deepseek.com 注册并创建密钥。需要我一步步指导你吗？';
    responseEn='You need a DeepSeek API key. Visit platform.deepseek.com to create one. Need step-by-step help?';
  }
  else if(t.includes('你是谁')||t.includes('who are you')){
    response='我是奥拉 (Aura)，你的AI助手。我负责了解你的需求、推荐最适合的方案，并全程指导你完成设置。你可以把我看作是你的AI concierge。';
    responseEn='I\'m Aura, your AI concierge. I help understand your needs, recommend the best plan, and guide you through setup.';
  }
  else if(t.includes('谢谢')||t.includes('thank')){
    response='不客气！随时找我。😊';
    responseEn='You\'re welcome! I\'m here anytime. 😊';
  }
  else if(t.includes('setup')||t.includes('安装')||t.includes('设置')||t.includes('配置')){
    if(state.paymentDone){
      response='你的AI助手正在配置中！请耐心等待30-60分钟。完成后我会通知你安装步骤。';
      responseEn='Your AI assistant is being configured! Please wait 30-60 minutes. I\'ll notify you when it\'s ready.';
    }else{
      response='请先完成引导流程选择方案并完成支付，然后我会指导你完成安装设置。';
      responseEn='Please complete the onboarding flow first, then I\'ll guide you through setup.';
    }
  }
  else if(t.includes('plan')||t.includes('方案')||t.includes('推荐')){
    const rec=recommendPlan();
    response='根据你的信息，我推荐'+rec.name+'，¥'+rec.price.toLocaleString()+'。包含：'+rec.feats.slice(0,3).join('、')+'。需要我详细介绍吗？';
    responseEn='Based on your info, I recommend '+rec.en+' at ¥'+rec.price.toLocaleString()+'. It includes '+rec.feats.slice(0,3).join(', ')+'. Want more details?';
  }
  else if(state.activated){
    response='收到！你的AI助手已经激活，可以根据你的需求开始工作。有什么具体任务需要我帮你处理吗？';
    responseEn='Got it! Your AI assistant is active. Any specific tasks you need help with?';
  }
  else if(hasContext){
    response=name+'，我明白你的意思。让我看看如何帮助你。你可以在引导标签中继续完成设置，或者直接告诉我你想了解什么。';
    responseEn='I understand, '+name+'. You can continue with onboarding or ask me anything.';
  }
  else{
    response='感谢你的消息！建议你先完成引导设置（点击下方"引导"标签），这样我可以根据你的职业和需求提供更精准的帮助。';
    responseEn='Thanks! Please complete onboarding (tap the Onboard tab) so I can provide tailored help based on your profession and needs.';
  }
  
  addChatMsg('ai',response,responseEn);
  renderChat();
}

/* ===== EXPORT PROVISIONING DATA ===== */

function downloadProvisioningData() {
  const plan = getPlan(state.planChosen);
  const data = {
    name: state.name || '',
    wechat_id: state.wechatId || '',
    profession: state.profession || 'other',
    os: state.computer || 'mac',
    terminal_comfort: state.terminalComfort || 'never',
    api_provider: state.apiProvider || '',
    api_provider_label: state.apiProvider ? (AI_PROVIDERS.find(p=>p.id===state.apiProvider)?.label || '未选择') : '',
    time_sinks: state.timeSinks,
    tools: state.dailyTools,
    ai_needs: state.aiHelpText || '',
    plan: state.planChosen || 'starter',
    plan_price: plan ? plan.price : 1999,
    status: state.activated ? 'activated' : (state.paymentDone ? 'pending' : 'pending')
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'lingxi-config-' + (state.name || 'user') + '.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
